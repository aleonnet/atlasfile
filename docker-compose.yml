services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: atlasfile-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Kaid0Search!2026X}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: atlasfile-dashboards
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Kaid0Search!2026X}
      - OPENSEARCH_SSL_VERIFICATIONMODE=none
    ports:
      - "5601:5601"
    depends_on:
      - opensearch

  api:
    build:
      context: ./backend
    container_name: atlasfile-api
    environment:
      - OPENSEARCH_HOST=https://opensearch:9200
      - OPENSEARCH_INDEX=atlasfile_documents
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Kaid0Search!2026X}
      - PROJECTS_ROOT=/projects
      - AUTO_RECONCILE_INTERVAL_SECONDS=${AUTO_RECONCILE_INTERVAL_SECONDS:-600}
      - AUTO_RECONCILE_REINDEX_SEARCH=${AUTO_RECONCILE_REINDEX_SEARCH:-true}
    volumes:
      - ${PROJECTS_HOST_ROOT:-/Users/alessandro/Library/CloudStorage/OneDrive-Personal/Documentos/Projects}:/projects
    ports:
      - "8000:8000"
    depends_on:
      - opensearch

  web:
    build:
      context: ./frontend
    container_name: atlasfile-web
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  opensearch_data:
