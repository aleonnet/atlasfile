<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 16 16" aria-label="AtlasFile pixel owl">
  <rect width="16" height="16" fill="none"/>

  <!-- Outline -->
  <g fill="#1a1220">
    <!-- Ear tips -->
    <rect x="3" y="1" width="1" height="1"/>
    <rect x="12" y="1" width="1" height="1"/>
    <!-- Ear sides -->
    <rect x="2" y="2" width="1" height="1"/>
    <rect x="4" y="2" width="1" height="1"/>
    <rect x="11" y="2" width="1" height="1"/>
    <rect x="13" y="2" width="1" height="1"/>
    <!-- Head top -->
    <rect x="2" y="3" width="1" height="1"/>
    <rect x="13" y="3" width="1" height="1"/>
    <!-- Body sides -->
    <rect x="1" y="4" width="1" height="6"/>
    <rect x="14" y="4" width="1" height="6"/>
    <!-- Taper -->
    <rect x="2" y="10" width="1" height="1"/>
    <rect x="13" y="10" width="1" height="1"/>
    <rect x="3" y="11" width="1" height="1"/>
    <rect x="12" y="11" width="1" height="1"/>
    <rect x="4" y="12" width="1" height="1"/>
    <rect x="11" y="12" width="1" height="1"/>
    <!-- Feet -->
    <rect x="5" y="13" width="2" height="1"/>
    <rect x="9" y="13" width="2" height="1"/>
  </g>

  <!-- Body -->
  <g fill="#ff5a36">
    <!-- Ear fills -->
    <rect x="3" y="2" width="1" height="1"/>
    <rect x="12" y="2" width="1" height="1"/>
    <!-- Head -->
    <rect x="3" y="3" width="10" height="1"/>
    <rect x="2" y="4" width="12" height="1"/>
    <!-- Face (around eyes) -->
    <rect x="2" y="5" width="1" height="1"/>
    <rect x="6" y="5" width="4" height="1"/>
    <rect x="13" y="5" width="1" height="1"/>
    <rect x="2" y="6" width="1" height="1"/>
    <rect x="6" y="6" width="4" height="1"/>
    <rect x="13" y="6" width="1" height="1"/>
    <rect x="2" y="7" width="1" height="1"/>
    <rect x="6" y="7" width="4" height="1"/>
    <rect x="13" y="7" width="1" height="1"/>
    <!-- Below eyes / around beak -->
    <rect x="2" y="8" width="5" height="1"/>
    <rect x="9" y="8" width="5" height="1"/>
    <!-- Body sides -->
    <rect x="2" y="9" width="2" height="1"/>
    <rect x="12" y="9" width="2" height="1"/>
    <rect x="3" y="10" width="1" height="1"/>
    <rect x="12" y="10" width="1" height="1"/>
    <rect x="4" y="11" width="1" height="1"/>
    <rect x="11" y="11" width="1" height="1"/>
    <!-- Bottom -->
    <rect x="5" y="12" width="6" height="1"/>
  </g>

  <!-- Belly (golden parchment) -->
  <g fill="#ffcc66">
    <rect x="4" y="9" width="8" height="1"/>
    <rect x="4" y="10" width="8" height="1"/>
    <rect x="5" y="11" width="6" height="1"/>
  </g>

  <!-- Eyes (white) -->
  <g fill="#f5f4f8">
    <!-- Left eye -->
    <rect x="3" y="5" width="3" height="1"/>
    <rect x="3" y="6" width="1" height="1"/>
    <rect x="5" y="6" width="1" height="1"/>
    <rect x="3" y="7" width="3" height="1"/>
    <!-- Right eye -->
    <rect x="10" y="5" width="3" height="1"/>
    <rect x="10" y="6" width="1" height="1"/>
    <rect x="12" y="6" width="1" height="1"/>
    <rect x="10" y="7" width="3" height="1"/>
  </g>

  <!-- Eye shine -->
  <g fill="#ffffff">
    <rect x="3" y="5" width="1" height="1"/>
    <rect x="12" y="5" width="1" height="1"/>
  </g>

  <!-- Pupils -->
  <g fill="#0e0d10">
    <rect x="4" y="6" width="1" height="1"/>
    <rect x="11" y="6" width="1" height="1"/>
  </g>

  <!-- Beak (amber) -->
  <g fill="#e8a030">
    <rect x="7" y="8" width="2" height="1"/>
  </g>
</svg>
